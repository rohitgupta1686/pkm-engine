name = "pkm-query"
main = "worker-query.js"
compatibility_date = "2026-06-01"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "pkm-claims"

# Non-secret config. Override per-environment in CF dashboard if needed.
[vars]
# intentionally empty — all config is injected via secrets or bindings

# Secrets (wrangler secret put -c wrangler-query.toml):
#   PKM_KEY        — same X-PKM-Key shared secret as pkm-clip worker
#   TURSO_URL      — libsql HTTP URL (e.g. libsql://db-name-org.turso.io)
#   TURSO_TOKEN    — Turso database auth token
#   OPENAI_API_KEY — for gpt-5.4-mini synthesis
