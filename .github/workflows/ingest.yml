name: ingest

# Cloud ingestion — nothing runs on a local machine. The capture worker fires a
# repository_dispatch(ingest); this job checks out the vault, synthesizes one
# Markdown note per new raw capture via a single OpenAI GPT-5.4 call, and commits
# the notes back. No Turso, no Vectorize, no database.

on:
  repository_dispatch:
    types: [ingest]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: # manual trigger for testing

concurrency:
  group: ingest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    # One LLM call per source (~13s each) + commit. Generous ceiling for a large
    # backlog; fast nightly runs finish early. Public repo → free minutes, $0.
    timeout-minutes: 30

    steps:
      - name: Checkout engine code
        uses: actions/checkout@v4
        with:
          path: engine

      - name: Checkout vault data
        uses: actions/checkout@v4
        with:
          repository: rohitgupta1686/pkm-vault
          token: ${{ secrets.VAULT_PAT }}
          path: vault
          persist-credentials: true
          fetch-depth: 0  # full history for the GUARD-07 backup push

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: pip install -e ./engine   # no libsql/Rust deps → fast, wheel-only

      - name: Run batch ingest (single GPT-5.4 call per source)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # PKM_SYNTHESIS_MODEL defaults to gpt-5.4 (config.py); override here if needed.
          PKM_RUN_COST_CAP_USD: "0.50"
        run: pkm batch-ingest --new-only --vault "$GITHUB_WORKSPACE/vault"

      - name: Commit synthesized notes
        working-directory: vault
        run: |
          git config user.name "pkm-bot"
          git config user.email "pkm-bot@users.noreply.github.com"
          git add notes/
          if git diff --cached --quiet; then
            echo "No new notes to commit."
            exit 0
          fi
          git commit -m "synthesize: $(date -u +%FT%TZ)"
          # The capture worker pushes raw clips to this same branch, so a clip
          # landing between our checkout and push rejects a bare push as
          # non-fast-forward. Rebase our synthesize commit onto the latest
          # remote and retry a few times to absorb concurrent clip pushes.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed notes on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (concurrent push?); retrying in 5s..."
            sleep 5
          done
          echo "ERROR: failed to push notes after 5 attempts." >&2
          exit 1

      - name: Backup push to second remote
        # GUARD-07: off-site backup of the vault — now the ONLY irreplaceable asset
        # (no Turso/Vectorize to rebuild from). BACKUP_REMOTE_URL is a full https URL
        # with an embedded credential scoped to the backup repo only. Clear the
        # checkout extraheader (carries VAULT_PAT, scoped to pkm-vault) so git uses
        # the backup credential instead.
        if: always()
        working-directory: vault
        continue-on-error: true
        run: git -c http.https://github.com/.extraheader= push "${{ secrets.BACKUP_REMOTE_URL }}" HEAD:refs/heads/main
