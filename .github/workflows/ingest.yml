name: ingest

# Cloud ingestion (OpenAI gpt-5.5, via the Batch API) is the PRIMARY path. As of
# 2026-07-09 it fires PER CLIP: the capture worker commits raw/*.md and fires
# repository_dispatch(ingest), which this workflow now listens for — so a note is
# synthesized right after a clip lands rather than waiting for the nightly cron.
# The nightly schedule stays on as an idempotent backstop (--new-only skips notes
# that already exist). See DECISIONS.md (2026-07-09).
#
# This job checks out the vault, submits every new raw capture as ONE OpenAI Batch
# job (gpt-5.5, 50% discount → cost-neutral vs the old gpt-5.4 sync path), blocks
# until the batch completes, then commits the synthesized notes back. No database.

on:
  workflow_dispatch: # manual run, always available
  schedule:
    - cron: "0 3 * * *"   # nightly backstop for any clip whose dispatch was missed
  repository_dispatch:
    types: [ingest]       # per-clip: fired by the capture worker on every clip

concurrency:
  group: ingest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    # Submit a Batch job, then block-poll until it completes (24h SLA; usually
    # minutes for a per-clip batch of ~1) + commit. Generous ceiling under GitHub's
    # 6h job max; in-job poll timeout (batch_timeout_sec, 90m) cancels sooner if a
    # batch stalls. Public repo → free minutes, $0.
    timeout-minutes: 360

    steps:
      - name: Checkout engine code
        uses: actions/checkout@v4
        with:
          path: engine

      - name: Checkout vault data
        uses: actions/checkout@v4
        with:
          repository: rohitgupta1686/pkm-vault
          token: ${{ secrets.VAULT_PAT }}
          path: vault
          persist-credentials: true
          fetch-depth: 0  # full history for the GUARD-07 backup push

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: pip install -e ./engine   # no libsql/Rust deps → fast, wheel-only

      - name: Run batch ingest (one OpenAI Batch job, gpt-5.5)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # synthesis_model defaults to gpt-5.5 (config.py). Env overrides use the
          # bare field name (no PKM_ prefix): SYNTHESIS_MODEL / RUN_COST_CAP_USD /
          # BATCH_TIMEOUT_SEC. Default cost cap is $0.50; leave unset to use it.
        run: pkm batch-ingest --new-only --vault "$GITHUB_WORKSPACE/vault"

      - name: Commit synthesized notes
        working-directory: vault
        run: |
          git config user.name "pkm-bot"
          git config user.email "pkm-bot@users.noreply.github.com"
          git add notes/
          if git diff --cached --quiet; then
            echo "No new notes to commit."
            exit 0
          fi
          git commit -m "synthesize: $(date -u +%FT%TZ)"
          # The capture worker pushes raw clips to this same branch, so a clip
          # landing between our checkout and push rejects a bare push as
          # non-fast-forward. Rebase our synthesize commit onto the latest
          # remote and retry a few times to absorb concurrent clip pushes.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed notes on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (concurrent push?); retrying in 5s..."
            sleep 5
          done
          echo "ERROR: failed to push notes after 5 attempts." >&2
          exit 1

      - name: Backup push to second remote
        # GUARD-07: off-site mirror of the vault — now the ONLY irreplaceable asset
        # (no Turso/Vectorize to rebuild from). The pkm-vault remote is authoritative;
        # this is a ONE-WAY mirror, so we force-push to overwrite any divergence on the
        # backup (e.g. an orphaned commit left when a prior run's primary push was
        # rejected after this always()-step had already pushed). Force is safe because
        # nothing else writes to the backup; retry to absorb transient network errors.
        # BACKUP_REMOTE_URL is a full https URL with an embedded credential scoped to
        # the backup repo only. Clear the checkout extraheader (carries VAULT_PAT,
        # scoped to pkm-vault) so git uses the backup credential instead.
        if: always()
        working-directory: vault
        continue-on-error: true
        run: |
          for attempt in 1 2 3; do
            if git -c http.https://github.com/.extraheader= push --force "${{ secrets.BACKUP_REMOTE_URL }}" HEAD:refs/heads/main; then
              echo "Backup pushed on attempt $attempt."
              exit 0
            fi
            echo "Backup push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "WARNING: backup push failed after 3 attempts." >&2
          exit 1
