name: ingest

# Cloud ingestion (OpenAI GPT-5.4) — now a MANUAL fallback only. As of 2026-06-25
# the primary path is the local-Claude engine `pkm-engine-local` (run by hand on a
# Mac via CLIProxyAPI), so the auto-triggers were removed to stop CI from
# pre-empting it and re-incurring OpenAI spend on every clip. The capture worker
# still commits raw/*.md to the vault and may still fire repository_dispatch(ingest)
# — that dispatch is now intentionally a no-op here. Re-add the triggers below to
# restore automatic cloud ingestion. See DECISIONS.md (2026-06-25).
#
# This job checks out the vault, synthesizes one Markdown note per new raw capture
# via a single OpenAI GPT-5.4 call, and commits the notes back. No database.

on:
  workflow_dispatch: # manual run only — primary path is pkm-engine-local (local Claude)
  # Disabled 2026-06-25 (see header). Uncomment to restore automatic cloud ingestion:
  # repository_dispatch:
  #   types: [ingest]
  # schedule:
  #   - cron: "0 3 * * *"

concurrency:
  group: ingest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    # One LLM call per source (~13s each) + commit. Generous ceiling for a large
    # backlog; fast nightly runs finish early. Public repo → free minutes, $0.
    timeout-minutes: 30

    steps:
      - name: Checkout engine code
        uses: actions/checkout@v4
        with:
          path: engine

      - name: Checkout vault data
        uses: actions/checkout@v4
        with:
          repository: rohitgupta1686/pkm-vault
          token: ${{ secrets.VAULT_PAT }}
          path: vault
          persist-credentials: true
          fetch-depth: 0  # full history for the GUARD-07 backup push

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: pip install -e ./engine   # no libsql/Rust deps → fast, wheel-only

      - name: Run batch ingest (single GPT-5.4 call per source)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # PKM_SYNTHESIS_MODEL defaults to gpt-5.4 (config.py); override here if needed.
          PKM_RUN_COST_CAP_USD: "0.50"
        run: pkm batch-ingest --new-only --vault "$GITHUB_WORKSPACE/vault"

      - name: Commit synthesized notes
        working-directory: vault
        run: |
          git config user.name "pkm-bot"
          git config user.email "pkm-bot@users.noreply.github.com"
          git add notes/
          if git diff --cached --quiet; then
            echo "No new notes to commit."
            exit 0
          fi
          git commit -m "synthesize: $(date -u +%FT%TZ)"
          # The capture worker pushes raw clips to this same branch, so a clip
          # landing between our checkout and push rejects a bare push as
          # non-fast-forward. Rebase our synthesize commit onto the latest
          # remote and retry a few times to absorb concurrent clip pushes.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed notes on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (concurrent push?); retrying in 5s..."
            sleep 5
          done
          echo "ERROR: failed to push notes after 5 attempts." >&2
          exit 1

      - name: Backup push to second remote
        # GUARD-07: off-site mirror of the vault — now the ONLY irreplaceable asset
        # (no Turso/Vectorize to rebuild from). The pkm-vault remote is authoritative;
        # this is a ONE-WAY mirror, so we force-push to overwrite any divergence on the
        # backup (e.g. an orphaned commit left when a prior run's primary push was
        # rejected after this always()-step had already pushed). Force is safe because
        # nothing else writes to the backup; retry to absorb transient network errors.
        # BACKUP_REMOTE_URL is a full https URL with an embedded credential scoped to
        # the backup repo only. Clear the checkout extraheader (carries VAULT_PAT,
        # scoped to pkm-vault) so git uses the backup credential instead.
        if: always()
        working-directory: vault
        continue-on-error: true
        run: |
          for attempt in 1 2 3; do
            if git -c http.https://github.com/.extraheader= push --force "${{ secrets.BACKUP_REMOTE_URL }}" HEAD:refs/heads/main; then
              echo "Backup pushed on attempt $attempt."
              exit 0
            fi
            echo "Backup push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "WARNING: backup push failed after 3 attempts." >&2
          exit 1
