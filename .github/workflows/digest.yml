name: digest

# Weekly cross-note briefing (OpenAI GPT-5.4), added 2026-07-09 alongside the
# re-enabled nightly `ingest.yml` — see DECISIONS.md (2026-07-09). This job
# checks out the vault, folds everything saved to notes/ in the last 7 days
# into ONE `type: digest` note via a single OpenAI GPT-5.4 call, and commits
# it back. No database; same structure as ingest.yml, separate concurrency
# group so a Sunday digest run never contends with a nightly ingest run.

on:
  workflow_dispatch: # manual run, e.g. to dry-run before trusting the cron
  schedule:
    - cron: "0 4 * * 0"    # Sundays 04:00 UTC, after Saturday night's ingest

concurrency:
  group: digest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    # One LLM call total (not per-source like ingest) — a few minutes is generous.
    timeout-minutes: 15

    steps:
      - name: Checkout engine code
        uses: actions/checkout@v4
        with:
          path: engine

      - name: Checkout vault data
        uses: actions/checkout@v4
        with:
          repository: rohitgupta1686/pkm-vault
          token: ${{ secrets.VAULT_PAT }}
          path: vault
          persist-credentials: true
          fetch-depth: 0  # full history for the GUARD-07 backup push

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: pip install -e ./engine   # no libsql/Rust deps → fast, wheel-only

      - name: Run weekly digest (single GPT-5.4 call)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # PKM_SYNTHESIS_MODEL defaults to gpt-5.4 (config.py); override here if needed.
        run: pkm digest --days 7 --vault "$GITHUB_WORKSPACE/vault"

      - name: Commit digest note
        working-directory: vault
        run: |
          git config user.name "pkm-bot"
          git config user.email "pkm-bot@users.noreply.github.com"
          git add notes/
          if git diff --cached --quiet; then
            echo "No digest note to commit (nothing saved this period)."
            exit 0
          fi
          git commit -m "digest: $(date -u +%FT%TZ)"
          # ingest.yml (or a concurrent clip commit) may land between our
          # checkout and push, so a bare push can reject as non-fast-forward.
          # Rebase and retry a few times to absorb that.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed digest on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (concurrent push?); retrying in 5s..."
            sleep 5
          done
          echo "ERROR: failed to push digest note after 5 attempts." >&2
          exit 1

      - name: Backup push to second remote
        # GUARD-07: off-site mirror of the vault — the ONLY irreplaceable asset
        # (no Turso/Vectorize to rebuild from). The pkm-vault remote is authoritative;
        # this is a ONE-WAY mirror, so we force-push to overwrite any divergence on the
        # backup (e.g. an orphaned commit left when a prior run's primary push was
        # rejected after this always()-step had already pushed). Force is safe because
        # nothing else writes to the backup; retry to absorb transient network errors.
        # BACKUP_REMOTE_URL is a full https URL with an embedded credential scoped to
        # the backup repo only. Clear the checkout extraheader (carries VAULT_PAT,
        # scoped to pkm-vault) so git uses the backup credential instead.
        if: always()
        working-directory: vault
        continue-on-error: true
        run: |
          for attempt in 1 2 3; do
            if git -c http.https://github.com/.extraheader= push --force "${{ secrets.BACKUP_REMOTE_URL }}" HEAD:refs/heads/main; then
              echo "Backup pushed on attempt $attempt."
              exit 0
            fi
            echo "Backup push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "WARNING: backup push failed after 3 attempts." >&2
          exit 1
